general {
    grace = 0
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    color = rgb(0, 0, 0)
    blur_passes = 4
    blur_size = 6
    noise = 0.05
    brightness = 0.5
}

# Time
label {
    monitor =
    text = $TIME
    text_align = center
    color = rgb(255, 255, 255)
    font_size = 80
    font_family = Roboto
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %B %d')"
    text_align = center
    color = rgb(180, 180, 180)
    font_size = 24
    font_family = Roboto
    position = 0, 120
    halign = center
    valign = center
}

# Password
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_center = true
    dots_size = 0.2
    dots_spacing = 0.15
    outer_color = rgb(255, 255, 255)
    inner_color = rgb(30, 30, 30)
    font_color = rgb(255, 255, 255)
    fade_on_empty = true
    dots_text_format = <b>✱</b>
    placeholder_text = <i>Password...</i>
    position = 0, -20
    halign = center
    valign = center
}
